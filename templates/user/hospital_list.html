<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitals - Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="/user/dashboard">🏥 Patient Dashboard</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white">Welcome, {{ session.username }}</span>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="/user/dashboard" class="list-group-item list-group-item-action">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a href="/user/hospitals" class="list-group-item list-group-item-action active">
                        <i class="bi bi-hospital"></i> Hospitals
                    </a>
                    <a href="/user/doctors" class="list-group-item list-group-item-action">
                        <i class="bi bi-people"></i> Doctors
                    </a>
                    <a href="/user/history" class="list-group-item list-group-item-action">
                        <i class="bi bi-clock-history"></i> History
                    </a>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">Hospitals</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            {% for hospital in hospitals %}
                            <div class="col-md-6 mb-4">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <h5 class="card-title">{{ hospital.name }}</h5>
                                        <p class="card-text">
                                            <strong>Address:</strong> {{ hospital.address }}<br>
                                            <strong>City:</strong> {{ hospital.city }}<br>
                                            <strong>Phone:</strong> {{ hospital.phone }}<br>
                                            <strong>Email:</strong> {{ hospital.email }}
                                        </p>
                                        <a href="/user/doctors/{{ hospital.id }}" class="btn btn-info text-white">
                                            View Doctors
                                        </a>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
