<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/doctor/dashboard">🏥 Doctor Dashboard</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white">Dr. {{ session.username }}</span>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="/doctor/dashboard" class="list-group-item list-group-item-action">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a href="/doctor/appointments" class="list-group-item list-group-item-action">
                        <i class="bi bi-calendar-check"></i> Appointments
                    </a>
                    <a href="/doctor/profile" class="list-group-item list-group-item-action active">
                        <i class="bi bi-person-circle"></i> Profile
                    </a>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Complete Your Profile</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       value="{{ doctor.name if doctor else '' }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="hospital_id" class="form-label">Hospital</label>
                                <select class="form-control" id="hospital_id" name="hospital_id" required>
                                    <option value="">Select Hospital</option>
                                    {% for hospital in hospitals %}
                                    <option value="{{ hospital.id }}" 
                                            {% if doctor and doctor.hospital_id == hospital.id %}selected{% endif %}>
                                        {{ hospital.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="specialization" class="form-label">Specialization</label>
                                <input type="text" class="form-control" id="specialization" name="specialization" 
                                       value="{{ doctor.specialization if doctor else '' }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="qualification" class="form-label">Qualification</label>
                                <input type="text" class="form-control" id="qualification" name="qualification" 
                                       value="{{ doctor.qualification if doctor else '' }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="experience" class="form-label">Experience (Years)</label>
                                <input type="number" class="form-control" id="experience" name="experience" 
                                       value="{{ doctor.experience if doctor else '' }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" class="form-control" id="phone" name="phone" 
                                       value="{{ doctor.phone if doctor else '' }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       value="{{ doctor.email if doctor else '' }}">
                            </div>
                            <div class="mb-3">
                                <label for="fee" class="form-label">Consultation Fee</label>
                                <input type="number" step="0.01" class="form-control" id="fee" name="fee" 
                                       value="{{ doctor.fee if doctor else '' }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="available_days" class="form-label">Available Days</label>
                                <input type="text" class="form-control" id="available_days" name="available_days" 
                                       value="{{ doctor.available_days if doctor else '' }}" 
                                       placeholder="e.g., Monday, Wednesday, Friday" required>
                            </div>
                            <div class="mb-3">
                                <label for="available_time" class="form-label">Available Time</label>
                                <input type="text" class="form-control" id="available_time" name="available_time" 
                                       value="{{ doctor.available_time if doctor else '' }}" 
                                       placeholder="e.g., 9:00 AM - 5:00 PM" required>
                            </div>
                            <button type="submit" class="btn btn-success">Update Profile</button>
                            <a href="/doctor/dashboard" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
