<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Prescription</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/doctor/dashboard">🏥 Doctor Dashboard</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white">Dr. {{ session.username }}</span>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="/doctor/dashboard" class="list-group-item list-group-item-action">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a href="/doctor/appointments" class="list-group-item list-group-item-action active">
                        <i class="bi bi-calendar-check"></i> Appointments
                    </a>
                    <a href="/doctor/profile" class="list-group-item list-group-item-action">
                        <i class="bi bi-person-circle"></i> Profile
                    </a>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Add Prescription</h5>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <strong>Patient:</strong> {{ appointment.username }}<br>
                            <strong>Date:</strong> {{ appointment.appointment_date }}<br>
                            <strong>Time:</strong> {{ appointment.appointment_time }}<br>
                            <strong>Symptoms:</strong> {{ appointment.symptoms }}
                        </div>
                        
                        <form method="POST" action="">
                            <div class="mb-3">
                                <label for="diagnosis" class="form-label">Diagnosis</label>
                                <textarea class="form-control" id="diagnosis" name="diagnosis" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="medicines" class="form-label">Medicines (with dosage)</label>
                                <textarea class="form-control" id="medicines" name="medicines" rows="4" 
                                          placeholder="Medicine Name - Dosage - Duration&#10;e.g., Paracetamol - 500mg - Twice daily for 3 days" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="instructions" class="form-label">Additional Instructions</label>
                                <textarea class="form-control" id="instructions" name="instructions" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="followup_date" class="form-label">Follow-up Date (Optional)</label>
                                <input type="date" class="form-control" id="followup_date" name="followup_date">
                            </div>
                            <button type="submit" class="btn btn-success">Save Prescription</button>
                            <a href="/doctor/appointments" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
